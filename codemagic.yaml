workflows:
  ios-no-sign:
    name: iOS IPA sin firma (AltStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build iOS no-codesign
        script: flutter build ios --release --no-codesign
      - name: Empacar IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r NovedadesMovil.ipa Payload
    artifacts:
      - NovedadesMovil.ipa
